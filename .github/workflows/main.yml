name: Github Action - DNS Resolve

on:
  push:

permissions:
  contents: read

jobs:
  unit_tests:
    runs-on: ubuntu-latest
    name: Run unit tests
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
      - name: Install test dependencies
        run: python3 -m pip install --require-hashes -r requirements.txt
      - name: Run unit tests
        run: python3 -m unittest discover -s tests -v

  dns_resolve_test:
    needs: unit_tests
    runs-on: ubuntu-latest
    name: A job to test resolution
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
      - name: Test Working DNS Resolution
        uses: ./ # Uses an action in the root directory
        id: dns_check
        with:
          remotehost: 'google.com'
          recordtype: 'A'
          maxtime: '300'
      - name: Verify action output
        run: test -n "${{ steps.dns_check.outputs.myOutput }}"
